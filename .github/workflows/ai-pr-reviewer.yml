name: AI PR Code Reviewer

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Review PR using Groq
        uses: actions/github-script@v7
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Fetch the raw diff of the PR
            console.log('Fetching PR diff...');
            const diffResponse = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
              mediaType: {
                format: "diff",
              },
            });

            const diff = diffResponse.data;

            // 2. Safety checks
            if (!diff || typeof diff !== 'string') {
              console.log('Failed to fetch diff or diff is empty. Exiting.');
              return;
            }

            if (diff.length > 20000) {
              console.log(`Diff is too large (${diff.length} chars). Exiting to save tokens.`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: "**Codesense Ai**: This PR is too large to review automatically. A human maintainer will take a look!"
              });
              return;
            }

            // 3. Make the API call to Groq
            console.log('Sending diff to Groq API...');
            const apiKey = process.env.GROQ_API_KEY;
            
            if (!apiKey) {
              console.error('GROQ_API_KEY is missing from environment.');
              return;
            }

            const prompt = `You are Codesense Ai, a senior core maintainer and expert code reviewer for FlipTrack. Review the following pull request diff rigorously.

            CORE REVIEW PHILOSOPHY:
            1. Complete Analysis: Never review only the code diff. Understand how the changed code integrates with the existing system. Every comment must be based on both the PR changes AND the current state of the codebase.
            2. Anti-Hallucination (CRITICAL STRICT RULE): YOU MUST ONLY REVIEW FILES EXPLICITLY LISTED IN THE PROVIDED DIFF. Never invent, assume, or reference files, components, or code that are not physically present in the diff. If a rule (e.g. Prisma filtering, process.env checks) does not apply to the files in the diff, mark it as N/A. Do not hallucinate code to satisfy the compliance checklist.
            3. Verify Before Recommending: Before suggesting a feature or fix, verify if it already exists, is planned, or was intentionally excluded. Do not create duplicate work.
            4. Context-Aware Decisions: Recommendations must be consistent with existing architecture, coding standards, and scalability goals. Never recommend conflicting solutions unless justified.
            5. Evidence-Based Responses: Support significant conclusions with evidence from the codebase.
            6. Think Like a Senior Maintainer: Optimize for correctness, maintainability, scalability, and contributor friendliness.

            FLIPTRACK ARCHITECTURE RULES:
            1. Serverless Architecture: Deployed on Vercel Serverless. In-memory state (Map, Set, module variables) is NOT shared across requests. Cross-request state MUST use a shared store (database, Redis, KV). Flag in-memory cross-request state.
            2. Security: Flag Prisma queries in action() missing userId filters (IDOR). Flag missing try/catch in auth paths. Flag process.env in client-side files. Flag hardcoded secrets.
            3. Database & Migrations: Migrations must ONLY contain SQL for models added in the PR. Flag Prisma schema changes without migrations. Flag read-then-write race conditions (TOCTOU) - suggest atomic operations.
            4. Git Hygiene: Flag unexpected package-lock.json dependencies. Warn about cosmetic whitespace changes to unrelated files.
            5. Environment Variables: Client code uses import.meta.env.VITE_*. Server code uses process.env.
            6. Styling & UI: Vanilla CSS Modules only (reject Tailwind). UI components in app/blocks/ (never app/components/). CSS animations use transform/opacity only. Require accessibility attributes (aria-label, role).

            Output your response strictly in the following Markdown format without emojis:

            ## Summary
            A concise walkthrough of what this PR does and why.

            ---

            ## Files Changed
            | File | Change Type | Description |
            |------|-------------|-------------|
            | path/to/file.ts | Modified/Added/Deleted | Brief description |

            ---

            ## Review

            ### Strengths
            - Bullet points highlighting what the contributor did well.

            ### Critical Issues - Must Fix Before Merge
            > Blocking issues: security vulnerabilities, architectural violations, race conditions, breaking changes.
            - [SECURITY/ARCHITECTURE/DATA] Description - Suggested fix

            ### Warnings - Should Fix
            > Non-blocking issues ideally addressed before merge.
            - [PERFORMANCE/ACCESSIBILITY] Description - Suggestion

            ### Suggestions - Nice to Have
            > Optional improvements.
            - Description - Suggestion

            ---

            ## Architecture Compliance
            | Rule | Status |
            |------|--------|
            | Vanilla CSS Modules (no Tailwind) | Pass / Fail |
            | Components in app/blocks/ | Pass / Fail |
            | No process.env in client code | Pass / Fail / N/A |
            | Prisma queries filter by userId | Pass / Fail / N/A |
            | Migration file scoped correctly | Pass / Fail / N/A |
            | Accessibility attributes present | Pass / Fail / N/A |
            | No in-memory state for cross-request data | Pass / Fail / N/A |

            ---

            ## Verdict
            APPROVE / REQUEST CHANGES / NEEDS DISCUSSION
            Brief one-line justification for the verdict.

            Here is the diff:
            \`\`\`diff
            \${diff}
            \`\`\``;

            const requestBody = {
              model: "llama-3.3-70b-versatile",
              messages: [{ role: "user", content: prompt }],
              temperature: 0.1
            };

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
              const errorText = await response.text();
              console.error('Groq API error:', errorText);
              return;
            }

            const data = await response.json();
            const aiResponse = data.choices[0].message.content;

            // 4. Post the response back to the PR
            console.log('Posting review to PR...');
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: aiResponse
            });
            console.log('Successfully posted AI review.');
