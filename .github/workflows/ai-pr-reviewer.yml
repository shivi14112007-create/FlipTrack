name: AI PR Code Reviewer

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Review PR using Groq
        uses: actions/github-script@v7
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Fetch the raw diff of the PR
            console.log('Fetching PR diff...');
            const diffResponse = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
              mediaType: {
                format: "diff",
              },
            });

            const diff = diffResponse.data;

            // 2. Safety checks
            if (!diff || typeof diff !== 'string') {
              console.log('Failed to fetch diff or diff is empty. Exiting.');
              return;
            }

            if (diff.length > 20000) {
              console.log(`Diff is too large (${diff.length} chars). Exiting to save tokens.`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: "🤖 **AI Reviewer**: This PR is too large to review automatically. A human maintainer will take a look!"
              });
              return;
            }

            // 3. Make the API call to Groq
            console.log('Sending diff to Groq API...');
            const apiKey = process.env.GROQ_API_KEY;
            
            if (!apiKey) {
              console.error('GROQ_API_KEY is missing from environment.');
              return;
            }

            const prompt = `You are an expert, strict code reviewer. Review the following pull request diff.

            Output your response strictly in the following Markdown format. Use collapsible <details> tags where appropriate.
            
            ### 📝 Summary
            A short summary walkthrough of the changes.

            ### 📂 Files Changed
            A bulleted table or list of files changed and what was done in each.

            ### 🎭 Code Poem
            A fun 4-line rhyming poem about the code changes.

            <details>
            <summary>🚨 Bugs & Warnings</summary>
            List any potential bugs, security issues, or logic flaws here. If none, state "Looks solid!"
            </details>

            <details>
            <summary>💡 Suggestions & Best Practices</summary>
            List suggestions for improving performance, readability, or adherence to best practices.
            </details>

            Here is the diff:
            \`\`\`diff
            ${diff}
            \`\`\``;

            const requestBody = {
              model: "llama-3.3-70b-versatile",
              messages: [{ role: "user", content: prompt }],
              temperature: 0.1
            };

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
              const errorText = await response.text();
              console.error('Groq API error:', errorText);
              return;
            }

            const data = await response.json();
            const aiResponse = data.choices[0].message.content;

            // 4. Post the response back to the PR
            console.log('Posting review to PR...');
            const disclaimer = `\n\n---\n*🤖 This review was automatically generated by an AI using the Groq Llama 3 API. Please verify suggestions before applying them.*`;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: aiResponse + disclaimer
            });
            console.log('Successfully posted AI review.');
